# settings.yaml — layout & section state
# auto-synced with toolbar controls; edit either side

template: classic

layout:
  density:    balanced        # comfortable | balanced | compact
  font_scale: normal          # small | normal | large

personal:
  default_link_display: both  # label | url | both
  fields:
    - key: name
      visible: true
    - key: email
      visible: true
    - key: phone
      visible: true
    - key: location
      visible: true
    - key: website
      visible: true
      link_display: default
    - key: linkedin
      visible: true
      link_display: url
    - key: github
      visible: true
      link_display: url
    - key: huggingface
      visible: true
      link_display: default

sections:
  - key: summary
    title: "SUMMARY"
    visible: true
  - key: experience
    title: "EXPERIENCE"
    visible: true
  - key: education
    title: "EDUCATION"
    visible: true
  - key: skills
    title: "SKILLS"
    visible: true
  - key: projects
    title: "PROJECTS"
    visible: true
  - key: certifications
    title: "CERTIFICATIONS"
    visible: false
  - key: publications
    title: "PUBLICATIONS"
    visible: false
  - key: languages
    title: "LANGUAGES"
    visible: false
  - key: awards
    title: "AWARDS"
    visible: false
  - key: extracurricular
    title: "EXTRACURRICULAR"
    visible: false
