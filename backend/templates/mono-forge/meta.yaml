display_name: "Mono Forge"
description: "Indie devs, hackers, toolmakers — monospace brutalism, boxed header, and zero-polish technical attitude."
audience: engineering
recommended_sections:
  - experience
  - projects
  - skills
default_section_order:
  - summary
  - experience
  - projects
  - skills
  - education
  - publications
  - certifications
  - awards
  - languages
  - extracurricular
defaults:
  layout:
    density: compact
    font_scale: small
  personal:
    default_link_display: both
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "readme"
      visible: true
    - key: experience
      title: "experience"
      visible: true
    - key: projects
      title: "projects"
      visible: true
    - key: skills
      title: "stack"
      visible: true
    - key: education
      title: "education"
      visible: true
    - key: publications
      title: "papers"
      visible: false
    - key: certifications
      title: "certs"
      visible: false
    - key: awards
      title: "awards"
      visible: false
    - key: languages
      title: "languages"
      visible: false
    - key: extracurricular
      title: "misc"
      visible: false
