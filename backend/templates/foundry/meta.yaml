display_name: "Foundry"
description: "SWE, AI, startup operators — airy ink-only layout, Garamond display, and project-friendly breathing room."
audience: engineering
ui:
  badge: "New"
render:
  section_title_case: upper
  xelatex:
    hangul_main_fonts: ["Nanum Myeongjo", "UnBatang"]
    hangul_sans_fonts: ["Nanum Gothic", "UnDotum"]
    hangul_mono_fonts: ["UnDotum", "Nanum Gothic"]
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: awards
      title: "AWARDS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: extracurricular
      title: "ACTIVITIES"
      visible: false
