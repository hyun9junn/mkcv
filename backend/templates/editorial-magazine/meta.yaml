      title: "PUBLICATIONS"
      visible: true
    - key: awards
      title: "AWARDS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: skills
      title: "SKILLS"
