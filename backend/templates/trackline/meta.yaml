display_name: "Trackline"
description: "Product, design, data, research — left-rail chronology, strong career storytelling, and clean progression through time."
audience: general
render:
  section_title_case: lower
recommended_sections:
  - experience
  - projects
  - education
default_section_order:
  - summary
  - experience
  - projects
  - education
  - skills
  - publications
  - awards
  - certifications
  - languages
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: awards
      title: "AWARDS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: extracurricular
      title: "ACTIVITIES"
      visible: false
