display_name: "Masthead"
description: "Writers, editors, brand leads — oversized serif masthead, drop-cap summary, and narrative-first pacing."
audience: general
render:
  section_title_case: title
  xelatex:
    hangul_main_fonts: ["Nanum Myeongjo", "UnBatang"]
    hangul_sans_fonts: ["Nanum Gothic", "UnDotum"]
    hangul_mono_fonts: ["UnDotum", "Nanum Gothic"]
recommended_sections:
  - summary
  - experience
  - publications
  - awards
default_section_order:
  - summary
  - experience
  - education
  - publications
  - projects
  - skills
  - awards
  - languages
  - certifications
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "EDITOR'S NOTE"
      visible: true
    - key: experience
      title: "CAREER"
      visible: true
    - key: publications
      title: "BYLINES AND PUBLICATIONS"
      visible: true
    - key: awards
      title: "HONOURS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: projects
      title: "SELECTED WORKS"
      visible: true
    - key: skills
      title: "SKILLS AND TOOLING"
      visible: true
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: extracurricular
      title: "BEYOND THE PAGE"
      visible: false
