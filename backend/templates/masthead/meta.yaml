display_name: "Masthead"
description: "Writers, editors, brand leads — oversized serif masthead, drop-cap summary, and narrative-first pacing."
audience: general
recommended_sections:
  - summary
  - experience
  - publications
  - awards
default_section_order:
  - summary
  - experience
  - education
  - publications
  - projects
  - skills
  - awards
  - languages
  - certifications
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "Editor's Note"
      visible: true
    - key: experience
      title: "Career"
      visible: true
    - key: publications
      title: "Bylines and Publications"
      visible: true
    - key: awards
      title: "Honours"
      visible: true
    - key: education
      title: "Education"
      visible: true
    - key: projects
      title: "Selected Works"
      visible: true
    - key: skills
      title: "Skills and Tooling"
      visible: true
    - key: languages
      title: "Languages"
      visible: false
    - key: certifications
      title: "Certifications"
      visible: false
    - key: extracurricular
      title: "Beyond the Page"
      visible: false
