display_name: "Boardroom"
description: "Consulting, finance, senior IC — dense two-column header, burgundy serif authority, and compressed executive impact."
audience: corporate
render:
  section_title_case: upper
  xelatex:
    hangul_main_fonts: ["UnBatang", "Nanum Myeongjo"]
    hangul_sans_fonts: ["Nanum Gothic", "UnDotum"]
    hangul_mono_fonts: ["UnDotum", "Nanum Gothic"]
defaults:
  layout:
    density: compact
    font_scale: small
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: awards
      title: "AWARDS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: certifications
      title: "CERTIFICATIONS"
      visible: true
    - key: projects
      title: "SELECTED PROJECTS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: extracurricular
      title: "ACTIVITIES"
      visible: false
