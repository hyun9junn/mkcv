display_name: "Vertical Timeline"
description: "Date-rail timeline with dots — entries hang from a left margin chronology, forest-green accent — product, design, data, research"
audience: general
recommended_sections:
  - experience
  - projects
  - education
default_section_order:
  - summary
  - experience
  - projects
  - education
  - skills
  - publications
  - awards
  - certifications
  - languages
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
      - key: linkedin
        visible: true
      - key: github
        visible: true
      - key: huggingface
        visible: true
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: awards
      title: "AWARDS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
