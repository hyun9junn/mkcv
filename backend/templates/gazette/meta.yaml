display_name: "The Gazette"
description: "Newspaper-style nameplate with double rules, small-caps section heads, Roman-numeral publications list, deep aubergine accent — lawyers, classicists, writers, senior academics"
audience: academic
recommended_sections:
  - publications
  - experience
  - education
  - awards
default_section_order:
  - summary
  - education
  - experience
  - publications
  - awards
  - projects
  - skills
  - certifications
  - languages
  - extracurricular
defaults:
  layout:
    density: compact
    font_scale: small
  personal:
    link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
      - key: linkedin
        visible: true
      - key: github
        visible: true
      - key: huggingface
        visible: true
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: publications
      title: "PUBLICATIONS"
      visible: true
    - key: awards
      title: "AWARDS"
      visible: true
    - key: languages
      title: "LANGUAGES"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: false
    - key: skills
      title: "SKILLS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: extracurricular
      title: "EXTRACURRICULAR"
      visible: false
