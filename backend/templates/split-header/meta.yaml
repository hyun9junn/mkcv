display_name: "Split Header"
description: "Asymmetric two-tone nameplate (thin first name, black surname) beside a tinted contact card, italic pull-quote kickers per role, aubergine accent — for creative directors, brand strategists, and art leads"
audience: general
recommended_sections:
  - summary
  - experience
  - projects
  - awards
default_section_order:
  - summary
  - experience
  - projects
  - skills
  - awards
  - education
  - publications
  - certifications
  - languages
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
      - key: linkedin
        visible: true
      - key: github
        visible: true
      - key: huggingface
        visible: true
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: awards
      title: "AWARDS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: extracurricular
      title: "EXTRACURRICULAR"
      visible: false
