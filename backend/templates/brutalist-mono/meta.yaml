display_name: "Brutalist Mono"
description: "All-monospace brutalist look — boxed header, ASCII dividers, asterisk bullets, safety-orange accent — indie devs, hackers, tools-makers"
audience: engineering
recommended_sections:
  - experience
  - projects
  - skills
default_section_order:
  - summary
  - experience
  - projects
  - skills
  - education
  - publications
  - certifications
  - awards
  - languages
  - extracurricular
defaults:
  layout:
    density: compact
    font_scale: small
  personal:
    default_link_display: both
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: awards
      title: "AWARDS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: extracurricular
      title: "EXTRACURRICULAR"
      visible: false
