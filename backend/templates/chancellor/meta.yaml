display_name: "Chancellor"
description: "Conservative formal resume — red section rules, classic serif rhythm, and polished structure for traditional industries."
audience: general
render:
  section_title_case: title
  xelatex:
    hangul_main_fonts: ["UnBatang", "Nanum Myeongjo"]
    hangul_sans_fonts: ["UnDotum", "Nanum Gothic"]
    hangul_mono_fonts: ["UnDotum", "Nanum Gothic"]
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "SUMMARY"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: projects
      title: "PROJECTS"
      visible: true
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: publications
      title: "PUBLICATIONS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: awards
      title: "AWARDS"
      visible: false
    - key: extracurricular
      title: "EXTRACURRICULAR ACTIVITIES"
      visible: false
