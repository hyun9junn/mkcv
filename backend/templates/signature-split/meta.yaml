display_name: "Signature Split"
description: "Creative directors, brand strategists, art leads — asymmetric nameplate, quote-like role kickers, and portfolio energy."
audience: general
ui:
  badge: "New"
render:
  section_title_case: upper
recommended_sections:
  - summary
  - experience
  - projects
  - awards
default_section_order:
  - summary
  - experience
  - projects
  - skills
  - awards
  - education
  - publications
  - certifications
  - languages
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "STATEMENT"
      visible: true
    - key: experience
      title: "EXPERIENCE"
      visible: true
    - key: projects
      title: "SELECTED WORK"
      visible: true
    - key: skills
      title: "SKILLS"
      visible: true
    - key: awards
      title: "RECOGNITION"
      visible: true
    - key: education
      title: "EDUCATION"
      visible: true
    - key: publications
      title: "PRESS AND PUBLICATIONS"
      visible: false
    - key: certifications
      title: "CERTIFICATIONS"
      visible: false
    - key: languages
      title: "LANGUAGES"
      visible: false
    - key: extracurricular
      title: "BEYOND STUDIO"
      visible: false
