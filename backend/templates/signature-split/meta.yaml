display_name: "Signature Split"
description: "Creative directors, brand strategists, art leads — asymmetric nameplate, quote-like role kickers, and portfolio energy."
audience: general
recommended_sections:
  - summary
  - experience
  - projects
  - awards
default_section_order:
  - summary
  - experience
  - projects
  - skills
  - awards
  - education
  - publications
  - certifications
  - languages
  - extracurricular
defaults:
  layout:
    density: balanced
    font_scale: normal
  personal:
    default_link_display: label
    fields:
      - key: name
        visible: true
      - key: email
        visible: true
      - key: phone
        visible: true
      - key: location
        visible: true
      - key: website
        visible: true
        link_display: default
      - key: linkedin
        visible: true
        link_display: default
      - key: github
        visible: true
        link_display: default
      - key: huggingface
        visible: true
        link_display: default
  sections:
    - key: summary
      title: "Statement"
      visible: true
    - key: experience
      title: "Experience"
      visible: true
    - key: projects
      title: "Selected Work"
      visible: true
    - key: skills
      title: "Skills"
      visible: true
    - key: awards
      title: "Recognition"
      visible: true
    - key: education
      title: "Education"
      visible: true
    - key: publications
      title: "Press and Publications"
      visible: false
    - key: certifications
      title: "Certifications"
      visible: false
    - key: languages
      title: "Languages"
      visible: false
    - key: extracurricular
      title: "Beyond Studio"
      visible: false
