<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mkcv</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <link rel="stylesheet" href="lib/show-hint.css" />
  <link rel="stylesheet" href="yaml-autocomplete.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1a1a;
      color: #eee;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #toolbar h1 { font-size: 1rem; font-weight: 600; color: #fff; margin-right: auto; }

    #toolbar select, #toolbar button {
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #toolbar button:hover { background: #333; }

    #error-banner {
      display: none;
      background: #5c1f1f;
      color: #fca5a5;
      padding: 8px 16px;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    #sections-bar {
      flex-shrink: 0;
      background: #181818;
      border-bottom: 1px solid #333;
    }

    #sections-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      cursor: pointer;
      user-select: none;
      font-size: 0.8rem;
      color: #aaa;
    }

    #sections-header:hover { color: #fff; }

    #sections-panel {
      padding: 5px 16px 6px;
      display: none;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
    }
    .sections-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
      align-items: center;
    }
    .section-row {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 5px;
      border: 1px solid #333;
      border-radius: 20px;
      background: #242424;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .section-row:hover { border-color: #555; background: #2c2c2c; }
    .section-row.dragging { opacity: .35; }
    .section-row.drag-over { border-color: #60a5fa; box-shadow: 0 0 0 1px #60a5fa44; }
    .drag-handle { color: #444; cursor: grab; font-size: 10px; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    .section-row input[type="checkbox"] { width: 12px; height: 12px; cursor: pointer; accent-color: #60a5fa; flex-shrink: 0; }
    .section-row.hidden-section { opacity: .4; }
    .section-label { font-size: 0.72rem; color: #bbb; cursor: default; letter-spacing: 0.01em; }
    .btn-reset {
      background: transparent;
      border: none;
      color: #777;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      margin-left: 5px;
    }
    .btn-reset:hover { color: #fbbf24; }
    .btn-reset-order {
      background: transparent;
      border: none;
      color: #666;
      padding: 2px 6px;
      font-size: 0.72rem;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      white-space: nowrap;
      letter-spacing: 0.01em;
      align-self: center;
      margin-left: auto;
    }
    .btn-reset-order:hover { color: #60a5fa; }
    #reset-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #reset-modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }
    #reset-modal-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 8px; }
    #reset-modal-body { font-size: .85rem; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
    #reset-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #reset-modal-cancel {
      padding: 6px 16px; border-radius: 4px; border: 1px solid #444;
      background: #222; color: #ccc; font-size: .85rem; cursor: pointer;
    }
    #reset-modal-confirm {
      padding: 6px 16px; border-radius: 4px; border: 1px solid #b45309;
      background: #92400e; color: #fde68a; font-size: .85rem; cursor: pointer; font-weight: 500;
    }
    #undo-toast {
      display: none;
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 16px;
      align-items: center;
      gap: 16px;
      font-size: .85rem;
      color: #ccc;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      white-space: nowrap;
    }
    #undo-toast-btn {
      background: transparent;
      border: 1px solid #555;
      color: #93c5fd;
      border-radius: 4px;
      padding: 2px 10px;
      font-size: .8rem;
      cursor: pointer;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor-pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      overflow: hidden;
    }

    .CodeMirror {
      flex: 1;
      height: 100%;
      font-size: 13px;
    }

    #preview-pane {
      width: 50%;
      position: relative;
      overflow: hidden;
      background: #555;
    }

    #preview-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #preview-loading {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 0.9rem;
      align-items: center;
      justify-content: center;
    }

    #preview-error {
      display: none;
      padding: 24px 32px;
      background: #fff;
      color: #c00;
      font-family: monospace;
      font-size: 0.8rem;
      overflow-y: auto;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>mkcv</h1>
    <select id="template-select" title="Template"></select>
    <span id="template-recommended-badges" style="font-size:0.75rem;color:#9ca3af;margin-left:8px;"></span>
    <div id="density-group" style="display:inline-flex;align-items:center;border:1px solid #444;border-radius:4px;overflow:hidden;">
      <span style="padding:5px 8px;background:#1a1a1a;color:#666;font-size:0.7rem;letter-spacing:0.05em;text-transform:uppercase;border-right:1px solid #444;white-space:nowrap;">Density</span>
      <button type="button" data-value="comfortable" style="background:#222;color:#aaa;border:none;border-right:1px solid #333;padding:5px 10px;cursor:pointer;font-size:0.8rem;font-family:inherit;">Comfortable</button>
      <button type="button" data-value="balanced" style="background:#222;color:#aaa;border:none;border-right:1px solid #333;padding:5px 10px;cursor:pointer;font-size:0.8rem;font-family:inherit;">Balanced</button>
      <button type="button" data-value="compact" style="background:#222;color:#aaa;border:none;padding:5px 10px;cursor:pointer;font-size:0.8rem;font-family:inherit;">Compact</button>
    </div>
    <div id="font-scale-group" style="display:inline-flex;align-items:center;border:1px solid #444;border-radius:4px;overflow:hidden;">
      <span style="padding:5px 8px;background:#1a1a1a;color:#666;font-size:0.7rem;letter-spacing:0.05em;text-transform:uppercase;border-right:1px solid #444;">Font</span>
      <button type="button" data-value="small" style="background:#222;color:#aaa;border:none;border-right:1px solid #333;padding:5px 10px;cursor:pointer;font-size:0.8rem;font-family:inherit;">S</button>
      <button type="button" data-value="normal" style="background:#222;color:#aaa;border:none;border-right:1px solid #333;padding:5px 10px;cursor:pointer;font-size:0.8rem;font-family:inherit;">M</button>
      <button type="button" data-value="large" style="background:#222;color:#aaa;border:none;padding:5px 10px;cursor:pointer;font-size:0.8rem;font-family:inherit;">L</button>
    </div>
    <button id="btn-validate-template">✓ Validate Template</button>
    <button id="btn-md">↓ Markdown</button>
    <button id="btn-tex">↓ LaTeX</button>
    <button id="btn-pdf">↓ PDF</button>
  </div>
  <div id="error-banner"></div>
  <div id="sections-bar">
    <div id="sections-header">
      <span>Sections ▾</span>
    </div>
    <div id="sections-panel"></div>
  </div>
  <div id="main">
    <div id="editor-pane"></div>
    <div id="preview-pane">
      <iframe id="preview-frame" title="CV Preview"></iframe>
      <div id="preview-loading">Generating preview…</div>
      <div id="preview-error"></div>
    </div>
  </div>

  <div id="reset-modal">
    <div id="reset-modal-box">
      <div id="reset-modal-title"></div>
      <div id="reset-modal-body">This will replace the section content with the default template. You can undo immediately after.</div>
      <div id="reset-modal-actions">
        <button id="reset-modal-cancel">Cancel</button>
        <button id="reset-modal-confirm">↺ Reset</button>
      </div>
    </div>
  </div>

  <div id="undo-toast">
    <span id="undo-toast-message"></span>
    <button id="undo-toast-btn">Undo</button>
  </div>

  <script src="app.js"></script>
  <script src="layout-controls.js"></script>
  <script src="lib/show-hint.js"></script>
  <script src="yaml-autocomplete.js"></script>
  <script src="editor-adapter.js"></script>
  <script src="file-sync.js"></script>
  <script src="sections-state.js"></script>
  <script src="sections-ui.js"></script>
  <script src="templates.js"></script>
  <script src="validator.js"></script>
  <script src="preview.js"></script>
  <script src="export.js"></script>
</body>
</html>
