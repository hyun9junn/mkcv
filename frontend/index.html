<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mkcv</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1a1a;
      color: #eee;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #toolbar h1 { font-size: 1rem; font-weight: 600; color: #fff; margin-right: auto; }

    #toolbar select, #toolbar button {
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #toolbar button:hover { background: #333; }

    #error-banner {
      display: none;
      background: #5c1f1f;
      color: #fca5a5;
      padding: 8px 16px;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor-pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      overflow: hidden;
    }

    .CodeMirror {
      flex: 1;
      height: 100%;
      font-size: 13px;
    }

    #preview-pane {
      width: 50%;
      position: relative;
      overflow: hidden;
      background: #555;
    }

    #preview-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #preview-loading {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 0.9rem;
      align-items: center;
      justify-content: center;
    }

    #preview-error {
      display: none;
      padding: 24px 32px;
      background: #fff;
      color: #c00;
      font-family: monospace;
      font-size: 0.8rem;
      overflow-y: auto;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>mkcv</h1>
    <select id="template-select" title="Template"></select>
    <button id="btn-md">↓ Markdown</button>
    <button id="btn-tex">↓ LaTeX</button>
    <button id="btn-pdf">↓ PDF</button>
  </div>
  <div id="error-banner"></div>
  <div id="main">
    <div id="editor-pane"></div>
    <div id="preview-pane">
      <iframe id="preview-frame" title="CV Preview"></iframe>
      <div id="preview-loading">Generating preview…</div>
      <div id="preview-error"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="editor-adapter.js"></script>
  <script src="templates.js"></script>
  <script src="validator.js"></script>
  <script src="preview.js"></script>
  <script src="export.js"></script>
</body>
</html>
